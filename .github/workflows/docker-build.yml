name: DevSecOps Pipeline

on:
  push:
    branches:
      - main

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t secure-devsecops-app:v1 ./app

  security-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t secure-devsecops-app:v1 ./app

      - name: Generate Trivy JSON Report
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: secure-devsecops-app:v1
          format: json
          output: trivy-report.json

      - name: Generate Trivy Table Report
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: secure-devsecops-app:v1
          format: table
          output: trivy-report.txt

      - name: Upload Trivy Reports
        uses: actions/upload-artifact@v4
        with:
          name: trivy-security-reports
          path: |
            trivy-report.json
            trivy-report.txt

      - name: Security Gate
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: secure-devsecops-app:v1
          severity: HIGH,CRITICAL
          exit-code: 1
          format: table
    security-notification:
    runs-on: ubuntu-latest
    needs: security-scan
    if: failure()

    steps:
      - name: Send Email Alert
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true

          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}

          subject: "?? DevSecOps Security Gate Failed"

          to: ${{ secrets.EMAIL_TO }}
          from: ${{ secrets.GMAIL_USERNAME }}

          body: |
            Security Gate Failure Detected

            Repository:
            secure-devsecops-pipeline

            Workflow:
            DevSecOps Pipeline

            Status:
            FAILED

            Severity Threshold:
            HIGH,CRITICAL

            Action Required:
            Review the Trivy report artifact in GitHub Actions.

            Triggered By:
            ${{ github.actor }}

            Commit:
            ${{ github.sha }}